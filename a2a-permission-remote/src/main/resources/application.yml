server:
  port: 8081

spring:
  main:
    allow-bean-definition-overriding: true
  hcc:
    cache:
      enabled: true
      metrics:
        enabled: true
      local:
        initialCapacity: 1000
      circuitBreaker:
        failureThreshold: 10
  redis:
    #redisson:
    #  file: classpath:redisson-config.yml
    host: localhost
    port: 6379
    database: 0
    timeout: 2000ms

rocketmq:
  name-server: localhost:9876
  producer:
    group: my-producer-group